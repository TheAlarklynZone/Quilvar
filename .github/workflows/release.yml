name: Release Quilvar

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Generate icons
        run: node generate-icons.cjs

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Quilvar ${{ github.ref_name }}'
          releaseBody: |
            🪶 **Quilvar ${{ github.ref_name }}**

            ---

            ## 🪟 Windows
            | File | Description |
            |------|-------------|
            | `Quilvar_${{ github.ref_name != '' && github.ref_name || 'v0.1.0' }}_x64-setup.exe` | Installer *(recommended)* |
            | `Quilvar_${{ github.ref_name != '' && github.ref_name || 'v0.1.0' }}_x64_en-US.msi` | MSI installer *(enterprise/advanced)* |

            ## 🍎 macOS
            | File | Description |
            |------|-------------|
            | `Quilvar_${{ github.ref_name != '' && github.ref_name || 'v0.1.0' }}_aarch64.dmg` | Apple Silicon — M1/M2/M3 *(recommended)* |
            | `Quilvar_aarch64.app.tar.gz` | Apple Silicon — updater format |

            ## 🐧 Linux
            | File | Description |
            |------|-------------|
            | `Quilvar_${{ github.ref_name != '' && github.ref_name || 'v0.1.0' }}_amd64.AppImage` | Universal — any distro *(recommended)* |
            | `Quilvar_${{ github.ref_name != '' && github.ref_name || 'v0.1.0' }}_amd64.deb` | Debian / Ubuntu |
            | `Quilvar-${{ github.ref_name != '' && github.ref_name || 'v0.1.0' }}-1.x86_64.rpm` | Fedora / RHEL / openSUSE |

            ---
            > `.sig` files are used internally by the auto-updater — you don't need to download them manually.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
